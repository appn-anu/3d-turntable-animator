<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Turntable Animator</title>
    <style>
      :root {
        --bg: #f4f5f7;
        --panel: #ffffff;
        --line: #d9dde3;
        --ink: #1c2330;
        --muted: #6b7280;
        --accent: #3b6ef5;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        color: var(--ink);
        background: var(--bg);
        line-height: 1.5;
      }
      header {
        padding: 0.75rem 1.25rem;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
      }
      header h1 {
        font-size: 1.1rem;
        margin: 0;
      }
      header .sub {
        color: var(--muted);
        font-size: 0.85rem;
      }
      header a {
        margin-left: auto;
        color: var(--accent);
        font-size: 0.85rem;
      }
      main {
        display: grid;
        grid-template-columns: 1fr 20rem;
        gap: 1rem;
        padding: 1rem;
        align-items: start;
      }
      @media (max-width: 780px) {
        main {
          grid-template-columns: 1fr;
        }
      }
      .stage {
        position: relative;
        background: #ffffff;
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
        aspect-ratio: 1 / 1;
      }
      .stage canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .dropzone {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: var(--muted);
        padding: 2rem;
        pointer-events: none;
      }
      .dropzone.hidden {
        display: none;
      }
      .stage.dragover {
        outline: 2px dashed var(--accent);
        outline-offset: -6px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .group > h2 {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin: 0;
      }
      .field {
        display: grid;
        grid-template-columns: 6.5rem 1fr;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
      }
      .field label {
        color: var(--muted);
      }
      .field output {
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        text-align: right;
      }
      .field.range {
        grid-template-columns: 6.5rem 1fr 2.5rem;
      }
      input[type='range'] {
        width: 100%;
      }
      select,
      input[type='number'] {
        font: inherit;
        padding: 0.25rem 0.4rem;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
      }
      .toggle {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
      }
      .swatches {
        display: flex;
        gap: 0.4rem;
      }
      .swatch {
        width: 1.6rem;
        height: 1.6rem;
        border-radius: 6px;
        border: 1px solid var(--line);
        cursor: pointer;
        padding: 0;
      }
      .swatch[aria-pressed='true'] {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }
      button.file {
        font: inherit;
        padding: 0.5rem 0.75rem;
        border: 1px solid var(--accent);
        color: #fff;
        background: var(--accent);
        border-radius: 8px;
        cursor: pointer;
      }
      button.file:disabled {
        opacity: 0.6;
        cursor: default;
      }
      button.file.danger {
        background: #b5342b;
        border-color: #b5342b;
      }
      button.file.ghost {
        background: #fff;
        color: var(--accent);
      }
      .export-progress {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }
      .export-progress[hidden] {
        display: none;
      }
      .export-progress progress {
        width: 100%;
        height: 0.55rem;
        accent-color: var(--accent);
      }
      .export-progress .info {
        font-variant-numeric: tabular-nums;
      }
      a.download {
        display: inline-block;
        text-align: center;
        text-decoration: none;
        font: inherit;
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
        background: #1f9d55;
        color: #fff;
        border: 1px solid #1f9d55;
      }
      a.download[hidden] {
        display: none;
      }
      .error-note {
        font-size: 0.82rem;
        color: #b5342b;
      }
      .error-note:empty {
        display: none;
      }
      .info {
        font-size: 0.82rem;
        color: var(--muted);
      }
      .info .count {
        color: var(--ink);
        font-weight: 600;
      }
      .warnings {
        margin: 0;
        padding-left: 1.1rem;
        font-size: 0.8rem;
        color: #9a6a00;
      }
      .warnings:empty {
        display: none;
      }
      fieldset {
        border: none;
        margin: 0;
        padding: 0;
      }
      fieldset:disabled {
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>3D Turntable Animator</h1>
      <span class="sub">PLY &rarr; turntable preview</span>
      <a href="./harness.html">encode spike &rarr;</a>
    </header>

    <main>
      <div class="stage" id="stage">
        <canvas id="preview"></canvas>
        <div class="dropzone" id="dropzone">
          Drop a <strong>.ply</strong> file here, or use <em>Load PLY</em>.
        </div>
      </div>

      <div class="panel">
        <div class="group">
          <input type="file" id="file" accept=".ply" hidden />
          <button class="file" id="loadBtn" type="button">Load PLY&hellip;</button>
          <p class="info" id="info">No model loaded.</p>
          <ul class="warnings" id="warnings"></ul>
        </div>

        <fieldset id="controls" disabled>
          <div class="group">
            <h2>Camera</h2>
            <div class="field">
              <label for="axis">Up axis</label>
              <select id="axis">
                <option value="x">X</option>
                <option value="y">Y</option>
                <option value="z" selected>Z</option>
              </select>
            </div>
            <div class="field range">
              <label for="fov">FoV</label>
              <input type="range" id="fov" min="15" max="90" step="1" value="60" />
              <output id="fovOut">60&deg;</output>
            </div>
            <div class="field range">
              <label for="margin">Framing</label>
              <input type="range" id="margin" min="1.1" max="3" step="0.05" value="1.5" />
              <output id="marginOut">1.50</output>
            </div>
            <div class="field">
              <label for="direction">Spin</label>
              <select id="direction">
                <option value="ccw" selected>Counter-clockwise</option>
                <option value="cw">Clockwise</option>
              </select>
            </div>
            <div class="field">
              <label for="turns">Turns</label>
              <input type="number" id="turns" min="1" max="10" step="1" value="1" />
            </div>
          </div>

          <div class="group">
            <h2>Output</h2>
            <div class="field">
              <label>Background</label>
              <div class="swatches" id="swatches">
                <button
                  class="swatch"
                  data-color="#ffffff"
                  style="background: #ffffff"
                  aria-pressed="true"
                  title="White"
                ></button>
                <button
                  class="swatch"
                  data-color="#000000"
                  style="background: #000000"
                  aria-pressed="false"
                  title="Black"
                ></button>
              </div>
            </div>
            <label class="toggle">
              <input type="checkbox" id="exportCam" />
              Preview export camera
            </label>
          </div>

          <div class="group">
            <h2>Export</h2>
            <div class="field">
              <label for="size">Size</label>
              <select id="size">
                <option value="512">512 px</option>
                <option value="1080" selected>1080 px</option>
                <option value="1440">1440 px</option>
                <option value="2048">2048 px</option>
              </select>
            </div>
            <div class="field">
              <label for="fps">Frame rate</label>
              <select id="fps">
                <option value="24">24 fps</option>
                <option value="30" selected>30 fps</option>
                <option value="60">60 fps</option>
              </select>
            </div>
            <div class="field range">
              <label for="duration">Duration</label>
              <input type="range" id="duration" min="2" max="30" step="1" value="8" />
              <output id="durationOut">8s</output>
            </div>
            <p class="info" id="frameInfo">240 frames</p>
            <button class="file" id="renderBtn" type="button">Render video</button>
            <button class="file danger" id="cancelBtn" type="button" hidden>Cancel</button>
            <div class="export-progress" id="exportProgress" hidden>
              <progress id="progressBar" max="100" value="0"></progress>
              <span class="info" id="progressLabel"></span>
            </div>
            <a class="download" id="downloadLink" hidden>Download video</a>
            <button class="file ghost" id="retryBtn" type="button" hidden>
              Retry at half resolution
            </button>
            <p class="error-note" id="exportError"></p>
          </div>
        </fieldset>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
