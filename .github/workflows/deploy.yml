name: Deploy to GitHub Pages

# Build and publish dist/ to GitHub Pages on every push to main. Direct pushes to
# main skip the PR CI, so a fast typecheck + unit-test gate runs before the build to
# avoid publishing an obviously broken bundle (Playwright E2E stays on the PR path).
#
# Requires: Settings -> Pages -> Source = "GitHub Actions".
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight deploy finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
